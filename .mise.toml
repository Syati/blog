[settings]
env_shell_expand = false

[tools]
go = "1.23.8"

[env]
_.path = ["./bin", "{{ env.HOME }}/go/bin"]

[tasks.install-hugo]
description = "Install Hugo extended version"
run = "go install -tags extended github.com/gohugoio/hugo@latest"

[tasks.build-index]
description = "Build search index with Go"
run = "go run cmd/indexer/main.go"

[tasks.build]
description = "Build the site with Hugo"
run = """
go run cmd/indexer/main.go
hugo
"""

[tasks.serve]
description = "Start Hugo development server"
run = "hugo server -D"

[tasks.deploy]
description = "Deploy to GitHub Pages"
run = "./deploy.sh"
